<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>GameDrive - My Drive</title>
<link rel="icon" type="image/png" href="resources/icons/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
                colors: {
                    bg: { main: '#111111', surface: '#1c1c1c', hover: '#252525', input: '#161616' },
                    border: { subtle: '#2a2a2a', active: '#404040' },
                    brand: { DEFAULT: 'red', hover: '#FF6B6B', light: '#60a5fa', dark: '#1d4ed8', glow: 'rgba(59, 130, 246, 0.5)' }
                },
                boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.4)', 'glow': '0 0 15px rgba(59, 130, 246, 0.15)' },
                animation: { 'fade-in': 'fadeIn 0.5s ease-out' },
                keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
            }
        }
    }
</script>

<style>
    body { background-color: #111111; color: #e5e5e5; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    *:focus-visible { outline: 2px solid #500000; outline-offset: 2px; }
    .btn-pro { position: relative; overflow: hidden; transition: all 0.2s ease; border-radius: 0.5rem; font-weight: 500; letter-spacing: 0.025em; }
    .btn-pro:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    .btn-pro:active { transform: translateY(0); opacity: 0.9; }
    .btn-pro:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-ghost { background: transparent; border: 1px solid #333; color: #a1a1aa; border-radius: 0.5rem; transition: all 0.2s ease; }
    .btn-ghost:hover { border-color: #555; color: white; background: rgba(255,255,255,0.03); }
    .input-pro { background-color: #161616; border: 1px solid #2a2a2a; color: white; border-radius: 0.5rem; transition: all 0.2s; }
    .input-pro:focus { border-color: #f63b3b; box-shadow: 0 0 0 1px #f63b3b; outline: none; }
    .card-pro { background-color: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
</style>
</head>
<body class="antialiased min-h-screen flex flex-col relative font-sans selection:bg-brand selection:text-white">

<div id="loading-overlay" class="fixed inset-0 bg-[#111] z-[100] flex flex-col items-center justify-center transition-opacity duration-500 ease-out">
    <div class="flex flex-col items-center">
        <div class="h-10 w-10 border-2 border-brand/30 border-t-brand rounded-full animate-spin mb-6"></div>
        <div class="flex items-center space-x-2">
            <span class="text-white font-medium tracking-wide">GameDrive</span>
            <span class="text-gray-600 text-sm">v2.0</span>
        </div>
    </div>
</div>

<script src="navbar.js"></script>

<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12 max-w-5xl relative z-10 animate-fade-in">
    <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between pb-6 border-b border-[#2a2a2a]">
        <div>
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2 tracking-tight">Library</h1>
            <p class="text-gray-400 font-normal">Local storage management</p>
        </div>
    </div>

    <section id="upload-form" class="card-pro mb-12 relative overflow-hidden group">
        <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-brand to-transparent opacity-50"></div>
        <div class="p-6 md:p-8">
            <div class="flex items-center space-x-3 mb-8">
                <div class="p-2 bg-brand/10 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                </div>
                <h2 class="text-xl font-semibold text-white">Upload New Save</h2>
            </div>
            
            <div class="grid gap-6 md:grid-cols-2">
                <div class="md:col-span-2 space-y-2">
                    <label for="gameSearchInput" class="block text-xs font-medium text-gray-500 uppercase tracking-wider">Game Title</label>
                    <div class="relative">
                        <input type="text" id="gameSearchInput" placeholder="Search database..." class="input-pro w-full p-3.5 text-sm placeholder-gray-600" autocomplete="off">
                        <div id="gameDropdownList" class="absolute hidden z-20 w-full mt-1 bg-[#1c1c1c] border border-[#333] rounded-lg shadow-xl max-h-60 overflow-y-auto"></div>
                    </div>
                </div>

                <div class="md:col-span-2 flex space-x-3">
                    <input type="text" id="newGameNameInput" placeholder="Or create new entry..." class="input-pro flex-1 p-3 text-sm placeholder-gray-600">
                    <button id="addNewGameButton" disabled class="btn-ghost px-5 text-sm font-medium">Add</button>
                </div>

                <div class="md:col-span-2 space-y-2 mt-2">
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">Data Source</label>
                    <div class="flex items-center w-full">
                        <!-- Changed label to a div and button to prevent double-click behavior -->
                        <button type="button" id="selectFileButton" onclick="document.getElementById('fileInput').click()" class="btn-ghost px-6 py-3.5 bg-[#161616] hover:bg-[#222] border-r-0 rounded-r-none flex items-center justify-center border-gray-700 text-gray-300 text-sm font-medium whitespace-nowrap transition-colors">
                            Choose File
                        </button>
                        <input type="file" id="fileInput" class="hidden">
                        <div class="flex-1 relative">
                            <input type="text" readonly id="fileNameDisplay" value="No file selected" class="w-full bg-[#111] border border-gray-700 border-l-0 rounded-l-none rounded-r-lg py-3.5 px-4 text-sm text-gray-500 font-mono truncate focus:outline-none cursor-default">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-[#2a2a2a]">
                <button id="uploadButton" disabled class="btn-pro w-full py-4 bg-brand text-white text-sm font-semibold tracking-wide shadow-glow hover:bg-brand-hover">Install to Drive</button>
            </div>
        </div>
    </section>

    <div class="flex items-center justify-between mb-6 mt-12" id="save-directory">
         <div class="flex items-center space-x-3">
            <h2 class="text-xl font-semibold text-white">Installed Saves</h2>
            <span class="text-[10px] font-bold text-gray-500 px-2 py-0.5 border border-gray-800 rounded uppercase tracking-wider">Local</span>
        </div>
    </div>
   
   <section id="saveList" class="flex flex-col gap-3">
        <div id="emptyState" class="md:col-span-2 flex flex-col items-center justify-center p-12 text-center border border-dashed border-[#333] rounded-xl bg-[#161616]/50">
            <div class="h-12 w-12 bg-[#222] rounded-full flex items-center justify-center mb-4 text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
            </div>
            <p class="text-gray-400 font-medium">No Data Found</p>
            <p class="mt-1 text-xs text-gray-600">Your local directory is empty.</p>
        </div>
    </section>
</main>

<div id="settingsModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50 backdrop-blur-sm transition-all duration-300">
    <div class="card-pro w-full max-w-lg shadow-2xl transform scale-100 animate-fade-in">
        <div class="px-6 py-5 border-b border-[#2a2a2a] flex justify-between items-center bg-[#1c1c1c] rounded-t-xl">
            <h2 class="text-lg font-semibold text-white">System Settings</h2>
            <button id="closeSettingsBtn" class="text-gray-500 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="p-6 space-y-8">
            <div class="md:hidden grid grid-cols-1 gap-3 pb-6 border-b border-[#2a2a2a]">
                 <a href="guide.html" class="p-3 text-center rounded-lg bg-[#222] hover:bg-[#2a2a2a] text-white text-sm font-medium">View Guide</a>
            </div>
            <div>
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Storage Status</h3>
                <div class="flex justify-between items-center p-4 bg-[#111] border border-[#2a2a2a] rounded-lg">
                    <div class="flex items-center space-x-3">
                         <div class="p-2 bg-brand/10 rounded-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
                        </div>
                        <span class="text-gray-300 text-sm font-medium">Used Space</span>
                    </div>
                    <span id="storageUsageDisplay" class="font-mono text-sm text-white">0 KB</span>
                </div>
            </div>
            <div>
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Data Management</h3>
                <div class="space-y-4">
                    <button id="exportDataBtn" class="btn-ghost w-full flex items-center justify-center space-x-2 py-3 bg-[#161616] hover:bg-[#222] border-dashed border-[#444] text-white font-medium text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        <span>Backup All Saves</span>
                    </button>
                    <div class="relative py-2">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-[#2a2a2a]"></div></div>
                        <div class="relative flex justify-center"><span class="bg-[#1c1c1c] px-3 text-[10px] text-gray-500 uppercase tracking-wider font-semibold">Import</span></div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <input type="file" id="importFileInput" class="hidden" accept=".json">
                        <div class="flex space-x-0 w-full">
                            <button id="selectImportFileBtn" onclick="document.getElementById('importFileInput').click()" class="px-4 py-2.5 bg-[#222] hover:bg-[#2a2a2a] text-white text-xs font-medium border border-r-0 border-[#333] rounded-l-lg transition-colors">Browse</button>
                            <span id="importFileNameDisplay" class="flex-1 py-2.5 px-3 bg-[#111] border border-[#333] rounded-r-lg text-xs text-gray-500 truncate flex items-center">No file selected</span>
                        </div>
                        <button id="importDataBtn" disabled class="btn-pro w-full py-2.5 bg-brand/10 text-brand border border-brand/20 hover:bg-brand hover:text-white text-sm font-medium transition-all disabled:opacity-30">Restore Data</button>
                       <a class="text-[white] hover:underline hover:text-[lightblue] transition-colors" href="https://stadiastudios.github.io/stadia">StadiaStudios</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="messageModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
    <div class="card-pro p-6 w-full max-w-sm shadow-2xl relative border-l-4 border-l-brand rounded-l-none">
        <h3 id="modalTitle" class="text-lg font-bold mb-2 text-white">System Message</h3>
        <p id="modalMessage" class="text-gray-400 mb-6 text-sm leading-relaxed"></p>
        <div class="flex justify-end items-center space-x-4">
            <div id="modalSpinner" class="hidden animate-spin h-5 w-5 border-2 border-t-transparent border-brand rounded-full"></div>
            <button id="modalOkBtn" class="btn-pro px-6 py-2 bg-brand hover:bg-brand-hover text-white text-xs font-semibold tracking-wide">Dismiss</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    window.addEventListener('load', () => {
        const loader = document.getElementById('loading-overlay');
        if(loader) {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        }
    });

    // Added specific listener to update display when file is selected
    document.getElementById('fileInput')?.addEventListener('change', function(e) {
        const display = document.getElementById('fileNameDisplay');
        if (display && this.files[0]) {
            display.value = this.files[0].name;
        }
    });
    
    document.getElementById('importFileInput')?.addEventListener('change', function(e) {
        const display = document.getElementById('importFileNameDisplay');
        if (display && this.files[0]) {
            display.textContent = this.files[0].name;
        }
    });
</script>
</body>
</html>
